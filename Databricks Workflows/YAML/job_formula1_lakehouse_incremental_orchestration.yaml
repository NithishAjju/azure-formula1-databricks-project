resources:
  jobs:
    job_formula1_lakehouse_incremental_orchestration:
      name: job_formula1_lakehouse_incremental_orchestration
      tasks:
        - task_key: 01_identify_next_batch
          notebook_task:
            notebook_path: /Workspace/Users/nithishajju@outlook.com/Azure-Databricks-course/Formula1_Project-Incremental-Load/06-orchestration/01.Identify
              Next Batch
            source: WORKSPACE
          job_cluster_key: Job_cluster
        - task_key: Is_there_a_batch_to_process
          depends_on:
            - task_key: 01_identify_next_batch
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.01_identify_next_batch.values.has_batch}}"
            right: "true"
        - task_key: 02_create_new_batch
          depends_on:
            - task_key: Is_there_a_batch_to_process
              outcome: "true"
          notebook_task:
            notebook_path: /Workspace/Users/nithishajju@outlook.com/Azure-Databricks-course/Formula1_Project-Incremental-Load/06-orchestration/02.Create
              New Batch
            base_parameters:
              p_batch_id: "{{tasks.01_identify_next_batch.values.p_batch_id}}"
            source: WORKSPACE
          job_cluster_key: Job_cluster
        - task_key: job_formula1_lakehouse_incremental_refresh
          depends_on:
            - task_key: 02_create_new_batch
          run_job_task:
            job_id: 156786619955199
            job_parameters:
              p_batch_id: "{{tasks.01_identify_next_batch.values.p_batch_id}}"
        - task_key: 03_complete_batch
          depends_on:
            - task_key: job_formula1_lakehouse_incremental_refresh
          notebook_task:
            notebook_path: /Workspace/Users/nithishajju@outlook.com/Azure-Databricks-course/Formula1_Project-Incremental-Load/06-orchestration/03.Complete
              Batch
            base_parameters:
              p_batch_id: "{{tasks.01_identify_next_batch.values.p_batch_id}}"
            source: WORKSPACE
          job_cluster_key: Job_cluster
      job_clusters:
        - job_cluster_key: Job_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 17.3.x-scala2.13
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            azure_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: -1
            node_type_id: Standard_D4ds_v5
            custom_tags:
              ResourceClass: SingleNode
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      queue:
        enabled: true
